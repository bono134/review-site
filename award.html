<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어워드 | 도란도란독서</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .award_page {
            padding: 10rem 5% 6rem;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* ── 연도 탭 ── */
        .year_tab_bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(217, 156, 54, 0.3);
            padding-bottom: 1.2rem;
        }

        .year_tab {
            background: none;
            border: 1px solid rgba(217, 156, 54, 0.3);
            color: var(--grey-text);
            padding: 0.4rem 1.4rem;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .year_tab:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .year_tab.active {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
        }

        .add_year_btn {
            background: none;
            border: 1px dashed rgba(217, 156, 54, 0.5);
            color: var(--primary-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .add_year_btn:hover {
            background: rgba(217, 156, 54, 0.08);
        }

        /* ── 모달 ── */
        .award_modal {
            margin: auto;
            border: none;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 680px;
            width: 92%;
            background-color: var(--bg-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            color: var(--text-color);
            font-family: 'Noto Serif KR', serif;
        }

        .award_modal::backdrop {
            background-color: rgba(25, 22, 20, 0.6);
            backdrop-filter: blur(4px);
        }

        .award_answers_grid {
            display: grid;
            grid-template-columns: 52px 1fr;
            gap: 0.65rem 1rem;
            align-items: start;
            margin: 1.2rem 0;
        }

        .answer_label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: right;
            padding-top: 0.85rem;
        }

        /* ── 질문 카드 그리드 ── */
        .question_grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .question_card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.5rem 1.8rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            border-top: 3px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .question_card:hover {
            box-shadow: 0 8px 25px rgba(217, 156, 54, 0.12);
            transform: translateY(-2px);
        }

        .question_card_header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.8rem;
        }

        .question_text {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.45;
            flex: 1;
        }

        .card_btn_group {
            display: flex;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .row_btn {
            padding: 0.28rem 0.72rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .row_edit_btn {
            background: rgba(217, 156, 54, 0.1);
            color: var(--primary-color);
            border-color: rgba(217, 156, 54, 0.3);
        }

        .row_edit_btn:hover { background: var(--primary-color); color: #fff; }

        .row_del_btn {
            background: rgba(220, 53, 69, 0.08);
            color: #dc3545;
            border-color: rgba(220, 53, 69, 0.2);
        }

        .row_del_btn:hover { background: #dc3545; color: #fff; }

        /* ── 답변 목록 ── */
        .answer_list {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            border-top: 1px solid rgba(217, 156, 54, 0.15);
            padding-top: 1rem;
        }

        .answer_row {
            display: grid;
            grid-template-columns: 44px 1fr;
            gap: 0.8rem;
            align-items: baseline;
        }

        .answer_member {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: right;
        }

        .answer_content {
            font-size: 0.95rem;
            color: var(--text-color);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .answer_content.empty {
            color: var(--grey-text);
            font-style: italic;
        }

        .no_data_msg {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--grey-text);
            padding: 5rem 0;
            font-size: 1rem;
            line-height: 2;
        }

        /* ── 연도 삭제 버튼 ── */
        .year_delete_wrap {
            display: flex;
            justify-content: flex-end;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(220, 53, 69, 0.15);
        }

        .year_delete_btn {
            background: none;
            border: 1px solid rgba(220, 53, 69, 0.35);
            color: #dc3545;
            padding: 0.5rem 1.4rem;
            font-size: 0.88rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .year_delete_btn:hover {
            background: #dc3545;
            color: #fff;
            border-color: #dc3545;
        }

        @media (max-width: 768px) {
            .award_page { padding: 8rem 3% 4rem; }
            .award_modal { padding: 1.8rem; }
            .award_answers_grid { grid-template-columns: 44px 1fr; }
            .question_grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        // ── Firestore 조회 ──────────────────────────────────────
        async function fetchYears() {
            const snap = await getDocs(query(YEARS_COL(), orderBy('year', 'desc')));
            return snap.docs.map(d => Number(d.data().year));
        }

        async function fetchQuestions() {
            const snap = await getDocs(query(QS_COL(), orderBy('createdAt', 'asc')));
            return snap.docs.map(d => ({ id: d.id, ...d.data(), year: Number(d.data().year) }));
        }

        async function seedIfEmpty() {
            const [yearSnap, qSnap] = await Promise.all([
                getDocs(query(YEARS_COL(), limit(1))),
                getDocs(query(QS_COL(),    limit(1))),
            ]);
            if (yearSnap.empty) {
                for (const y of SEED_YEARS) {
                    await setDoc(yearDoc(y), { year: y, createdAt: serverTimestamp() });
                }
            }
            if (qSnap.empty) {
                for (const item of SEED_QUESTIONS) {
                    await addDoc(QS_COL(), { ...item, createdAt: serverTimestamp() });
                }
            }
        }

        // ── 유틸 ────────────────────────────────────────────────
        function escHtml(str) {
            return (str || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── 모달 열기 / 닫기 ────────────────────────────────────
        function openModal(title = '질문 등록') {
            document.getElementById('modal_title').textContent     = title;
            document.getElementById('form_submit_btn').textContent = editId ? '수정' : '등록';
            modal.showModal();
        }

        function closeModal() {
            modal.close();
            document.getElementById('input_question').value  = '';
            document.getElementById('input_ans_rosa').value  = '';
            document.getElementById('input_ans_hyh').value   = '';
            document.getElementById('input_ans_jisu').value  = '';
            editId = null;
        }

        // ── 연도 탭 렌더링 ──────────────────────────────────────
        function renderYearTabs() {
            const bar    = document.getElementById('year_tab_bar');
            const addBtn = document.getElementById('add_year_btn');
            bar.querySelectorAll('.year_tab').forEach(t => t.remove());

            years.forEach(y => {
                const btn = document.createElement('button');
                btn.className   = 'year_tab' + (y === activeYear ? ' active' : '');
                btn.textContent = y;
                btn.addEventListener('click', () => {
                    activeYear = Number(y);
                    renderYearTabs();
                    renderCards();
                });
                bar.insertBefore(btn, addBtn);
            });
        }

        // ── 질문 카드 렌더링 ────────────────────────────────────
        function renderCards() {
            const grid      = document.getElementById('question_grid');
            const deleteWrap = document.getElementById('year_delete_wrap');
            const filtered  = questions.filter(q => q.year === activeYear);
            grid.innerHTML  = '';
            deleteWrap.style.display = activeYear ? '' : 'none';

            if (!activeYear) {
                grid.innerHTML = '<div class="no_data_msg">연도를 먼저 추가해 주세요.</div>';
                return;
            }
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no_data_msg">아직 등록된 질문이 없습니다.<br>질문 등록 버튼으로 첫 질문을 추가해 보세요!</div>';
                return;
            }

            filtered.forEach(q => {
                const answersHtml = MEMBERS.map(m => {
                    const ans = (q.answers && q.answers[m]) || '';
                    return `
                        <div class="answer_row">
                            <span class="answer_member">${m}</span>
                            <span class="answer_content${ans ? '' : ' empty'}">${ans ? escHtml(ans) : '-'}</span>
                        </div>`;
                }).join('');

                const card = document.createElement('div');
                card.className = 'question_card';
                card.innerHTML = `
                    <div class="question_card_header">
                        <div class="question_text">${escHtml(q.question)}</div>
                        <div class="card_btn_group">
                            <button class="row_btn row_edit_btn" data-id="${q.id}">편집</button>
                            <button class="row_btn row_del_btn"  data-id="${q.id}">삭제</button>
                        </div>
                    </div>
                    <div class="answer_list">${answersHtml}</div>
                `;
                grid.appendChild(card);
            });
        }

        // ── 질문 등록 버튼 ──────────────────────────────────────
        document.getElementById('open_register_btn').addEventListener('click', () => {
            if (!activeYear) { alert('연도를 먼저 선택하거나 추가해주세요.'); return; }
            editId = null;
            openModal('질문 등록');
        });

        // ── 취소 ────────────────────────────────────────────────
        document.getElementById('form_cancel_btn').addEventListener('click', closeModal);

        // ── 등록 / 수정 ─────────────────────────────────────────
        document.getElementById('form_submit_btn').addEventListener('click', async () => {
            const question = document.getElementById('input_question').value.trim();
            const answers  = {
                '로사': document.getElementById('input_ans_rosa').value.trim(),
                '혜현': document.getElementById('input_ans_hyh').value.trim(),
                '지수': document.getElementById('input_ans_jisu').value.trim(),
            };

            if (!question) { alert('질문을 입력해주세요.'); return; }

            try {
                if (editId) {
                    await updateDoc(qDoc(editId), { question, answers, updatedAt: serverTimestamp() });
                } else {
                    await addDoc(QS_COL(), { year: activeYear, question, answers, createdAt: serverTimestamp() });
                }
                closeModal();
                questions = await fetchQuestions();
                renderCards();
            } catch (err) {
                console.error(err);
                alert('저장에 실패했습니다.');
            }
        });

        // ── 카드 이벤트 위임 (편집 / 삭제) ─────────────────────
        document.getElementById('question_grid').addEventListener('click', async e => {
            const editBtn = e.target.closest('.row_edit_btn');
            const delBtn  = e.target.closest('.row_del_btn');

            if (editBtn) {
                const q = questions.find(x => x.id === editBtn.dataset.id);
                if (!q) return;
                document.getElementById('input_question').value  = q.question;
                document.getElementById('input_ans_rosa').value  = q.answers?.['로사'] || '';
                document.getElementById('input_ans_hyh').value   = q.answers?.['혜현'] || '';
                document.getElementById('input_ans_jisu').value  = q.answers?.['지수'] || '';
                editId = q.id;
                openModal('질문 편집');
            }

            if (delBtn) {
                if (!confirm('이 질문을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) return;
                try {
                    await deleteDoc(qDoc(delBtn.dataset.id));
                    questions = await fetchQuestions();
                    renderCards();
                } catch (err) {
                    console.error(err);
                    alert('삭제에 실패했습니다.');
                }
            }
        });

        // ── 연도 추가 ───────────────────────────────────────────
        document.getElementById('add_year_btn').addEventListener('click', async () => {
            const input = prompt('추가할 연도를 입력하세요 (예: 2024)');
            if (!input) return;
            const year = parseInt(input.trim(), 10);
            if (isNaN(year) || year < 2000 || year > 2100) {
                alert('올바른 연도를 입력해주세요.');
                return;
            }
            if (years.includes(year)) {
                activeYear = year;
                renderYearTabs();
                renderCards();
                return;
            }
            try {
                await setDoc(yearDoc(year), { year, createdAt: serverTimestamp() });
                years      = await fetchYears();
                activeYear = year;
                renderYearTabs();
                renderCards();
            } catch (err) {
                console.error(err);
                alert('연도 추가에 실패했습니다.');
            }
        });

        // ── 연도 삭제 ───────────────────────────────────────────
        document.getElementById('year_delete_btn').addEventListener('click', async () => {
            if (!activeYear) return;
            if (!confirm(`${activeYear}년도를 삭제하시겠습니까?\n삭제 후 복구 불가능합니다.`)) return;

            try {
                // 해당 연도 질문 전체 삭제
                const yearQuestions = questions.filter(q => q.year === activeYear);
                await Promise.all(yearQuestions.map(q => deleteDoc(qDoc(q.id))));

                // 연도 문서 삭제
                await deleteDoc(yearDoc(activeYear));

                // 상태 갱신
                [years, questions] = await Promise.all([fetchYears(), fetchQuestions()]);
                activeYear = years.length > 0 ? Number(years[0]) : null;
                renderYearTabs();
                renderCards();
            } catch (err) {
                console.error(err);
                alert('삭제에 실패했습니다.');
            }
        });

        // ── 스크롤 헤더 ─────────────────────────────────────────
        const wrap = document.querySelector('.wrap');
        window.addEventListener('scroll', () => wrap.classList.toggle('scrolled', window.scrollY > 10));

        // ── 초기 실행 ───────────────────────────────────────────
        await seedIfEmpty();
        [years, questions] = await Promise.all([fetchYears(), fetchQuestions()]);
        if (years.length > 0) activeYear = Number(years[0]);
        renderYearTabs();
        renderCards();
    </script>
</body>

</html>
