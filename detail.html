<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 상세 - 도란도란독서</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme_light">
    <div class="wrap">
        <header class="header" id="main_header">
            <a href="index.html" class="logo"><span class="highlight">도</span>란<span class="highlight">도</span>란<span class="highlight">독</span>서</a>
            <nav class="gnb" id="main_gnb">
                <a href="reviews.html" class="active">리뷰</a>
                <a href="#">예비도서</a>
                <a href="#">어워드</a>
            </nav>
        </header>

        <div class="container detail_page_container">
            <main class="content">
                <div class="detail_box">
                    <div class="detail_header">
                        <div class="detail_title" id="detail_book_title">-</div>
                        <div class="detail_actions">
                            <button class="submit_btn" id="detail_edit_btn">수정</button>
                            <button class="delete_btn" id="detail_delete_btn">삭제</button>
                            <button class="cancel_btn" id="detail_list_btn">목록으로</button>
                        </div>
                    </div>

                    <div class="detail_info_grid">
                        <div class="info_item">
                            <span class="info_label">작성자</span>
                            <span class="info_value" id="detail_reviewer">-</span>
                        </div>
                        <div class="info_item">
                            <span class="info_label">저자</span>
                            <span class="info_value" id="detail_author">-</span>
                        </div>
                        <div class="info_item">
                            <span class="info_label">모임 날짜</span>
                            <span class="info_value" id="detail_date">-</span>
                        </div>
                        <div class="info_item">
                            <span class="info_label">별점</span>
                            <span class="info_value rating" id="detail_rating">-</span>
                        </div>
                    </div>

                    <div class="detail_content_area">
                        <div class="detail_section" id="detail_oneline_section" style="display:none;">
                            <div class="detail_section_title">한줄평</div>
                            <div class="detail_text oneline" id="detail_oneline">-</div>
                        </div>
                        <div class="detail_section" id="detail_check_section" style="display:none;">
                            <div class="detail_section_title">내용 점검</div>
                            <div class="detail_text" id="detail_check">-</div>
                        </div>
                        <div class="detail_section">
                            <div class="detail_section_title">읽은 소감</div>
                            <div class="detail_text" id="detail_thoughts">-</div>
                        </div>
                        <div class="detail_section" id="detail_other_section" style="display:none;">
                            <div class="detail_section_title">기타</div>
                            <div class="detail_text" id="detail_other">-</div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer class="footer">
            &copy; 2026 도란도란독서. All rights reserved.
        </footer>
    </div>

    <script type="module">
        import {
            db, getDoc, doc, deleteDoc
        } from './firebase-config.js';

        const postDoc = (reviewer, id) => doc(db, 'reviews', reviewer, 'posts', id);

        const urlParams = new URLSearchParams(window.location.search);
        const reviewer = urlParams.get('reviewer');
        const id = urlParams.get('id');

        if (!reviewer || !id) {
            alert('잘못된 접근입니다.');
            window.location.href = 'reviews.html';
        }

        async function loadDetail() {
            try {
                const snap = await getDoc(postDoc(reviewer, id));
                if (snap.exists()) {
                    const r = snap.data();
                    document.getElementById('detail_book_title').textContent = r.title;
                    document.getElementById('detail_reviewer').textContent   = r.reviewer;
                    document.getElementById('detail_author').textContent     = r.author || '-';
                    document.getElementById('detail_date').textContent       = r.date;
                    document.getElementById('detail_rating').textContent     = r.rating || '-';
                    document.getElementById('detail_check').textContent     = r.check || '';
                    document.getElementById('detail_thoughts').textContent   = r.thoughts || '';
                    document.getElementById('detail_oneline').textContent    = r.oneLine ? `"${r.oneLine}"` : '-';
                    document.getElementById('detail_other').textContent      = r.other || '';

                    if (r.check && r.check.trim()) {
                        document.getElementById('detail_check_section').style.display = '';
                    }

                    if (r.oneLine && r.oneLine.trim()) {
                        document.getElementById('detail_oneline_section').style.display = '';
                    }
                    if (r.other && r.other.trim()) {
                        document.getElementById('detail_other_section').style.display = '';
                    }
                } else {
                    alert('해당 리뷰를 찾을 수 없습니다.');
                    window.location.href = 'reviews.html';
                }
            } catch (err) {
                console.error('데이터 불러오기 실패:', err);
                alert('데이터를 불러오는데 실패했습니다.');
            }
        }

        document.getElementById('detail_edit_btn').addEventListener('click', () => {
            window.location.href = `write.html?reviewer=${encodeURIComponent(reviewer)}&id=${encodeURIComponent(id)}`;
        });

        document.getElementById('detail_delete_btn').addEventListener('click', async () => {
            if (!confirm('이 리뷰를 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.')) return;
            try {
                await deleteDoc(doc(db, 'reviews', reviewer, 'posts', id));
                alert('삭제되었습니다.');
                window.location.href = 'reviews.html';
            } catch (err) {
                console.error('삭제 실패:', err);
                alert('삭제에 실패했습니다.');
            }
        });

        document.getElementById('detail_list_btn').addEventListener('click', () => {
            window.location.href = 'reviews.html';
        });

        // ── 스크롤 헤더 이벤트
        const wrap = document.querySelector('.wrap');
        window.addEventListener('scroll', () => wrap.classList.toggle('scrolled', window.scrollY > 10));

        loadDetail();
    </script>
</body>

</html>
