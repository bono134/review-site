<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도도독 독서 모임</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme_dark">
    <div class="wrap">
        <header class="header" id="main_header">
            <a href="index.html" class="logo"><span class="highlight">도</span>란<span class="highlight">도</span>란<span class="highlight">독</span>서</a>
            <nav class="gnb" id="main_gnb">
                <a href="reviews.html">리뷰</a>
                <a href="books-preview.html">예비도서</a>
                <a href="award.html">어워드</a><span class="admin_trigger admin_trigger_btn">🔒</span>
            </nav>
        </header>

        <div class="container">
            <main class="content home_main">
                <div class="hero_top_text">
                    2022 <span class="dash">&mdash;</span> ing &nbsp;&middot;&nbsp; 독서 기록
                </div>

                <h1 class="hero_title">
                    책<span class="comma">,</span><br>
                    읽는 <span class="break_mobile">우리</span>
                </h1>

                <p class="hero_subtitle">
                    로사 &middot; 혜현 &middot; 지수의 독서 모임
                </p>

                <div class="stats_container">
                    <div class="stat_item">
                        <div class="stat_number" id="total_books">60</div>
                        <div class="stat_label">읽은 책</div>
                    </div>
                    <div class="stat_item">
                        <div class="stat_number" id="active_years">4</div>
                        <div class="stat_label">년째</div>
                    </div>
                    <div class="stat_item">
                        <div class="stat_number" id="average_rating">3.4</div>
                        <div class="stat_label">평균 별점</div>
                    </div>
                </div>
            </main>
            <aside class="areabox"></aside>
        </div>

        <footer class="footer">
            &copy; 2026 도란도란독서. All rights reserved.
            <span class="admin_indicator">· 관리자 모드</span>
            <span class="admin_trigger admin_trigger_btn">🔒</span>
        </footer>
    </div>

    <script type="module">
        import { db, collectionGroup, getDocs, query } from './firebase-config.js';
        import { setupAdminTrigger } from './admin.js';
        setupAdminTrigger();

        // 스크롤 헤더 고정
        const wrap = document.querySelector('.wrap');
        window.addEventListener('scroll', () => {
            wrap.classList.toggle('scrolled', window.scrollY > 10);
        });

        // 카운트업 애니메이션
        function countUp(el, target, decimals = 0, duration = 1400) {
            const start = performance.now();
            function tick(now) {
                const t = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
                el.innerText = (target * eased).toFixed(decimals);
                if (t < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        // 모임 유지 년도 계산 (2022년부터 시작)
        const startYear = 2022;
        const yearsActive = new Date().getFullYear() - startYear + 1;
        countUp(document.getElementById('active_years'), yearsActive, 0, 1000);

        // Firebase에서 리뷰 데이터 로드 → 읽은 책 수 + 평균 별점 계산
        try {
            const snap = await getDocs(query(collectionGroup(db, 'posts')));
            const reviews = snap.docs.map(d => d.data());

            // 읽은 책 수: (날짜 + 제목) 기준 고유 도서 수
            const uniqueBooks = new Set(reviews.map(r => `${r.date}|${r.title}`));
            countUp(document.getElementById('total_books'), uniqueBooks.size, 0, 1200);

            // 평균 별점: "★ 4.1" 또는 숫자 4.1 모두 처리
            const ratings = reviews
                .map(r => {
                    const v = r.rating;
                    if (typeof v === 'number') return v;
                    return parseFloat(String(v || '').replace(/[^0-9.]/g, ''));
                })
                .filter(n => !isNaN(n) && n > 0);
            if (ratings.length > 0) {
                const avg = ratings.reduce((a, b) => a + b, 0) / ratings.length;
                countUp(document.getElementById('average_rating'), avg, 1, 1400);
            }
        } catch (err) {
            console.error('통계 데이터 로드 실패:', err);
        }
    </script>
</body>

</html>
