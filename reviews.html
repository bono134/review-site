<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 - 도란도란독서</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme_light">
    <div class="wrap">
        <header class="header" id="main_header">
            <a href="index.html" class="logo"><span class="highlight">도</span>란<span class="highlight">도</span>란<span class="highlight">독</span>서</a>
            <nav class="gnb" id="main_gnb">
                <a href="reviews.html" class="active">리뷰</a>
                <a href="#">예비도서</a>
                <a href="#">어워드</a>
            </nav>
        </header>

        <div class="container">
            <main class="content board_page">
                <div class="board_header">
                    <h1 class="board_title">리뷰 목록</h1>
                    <button class="register_btn" id="open_register_btn">등록</button>
                </div>

                <section class="latest_highlights" id="latest_highlights"></section>

                <div class="filter_bar">
                    <div class="filter_tabs">
                        <button class="filter_tab active">전체</button>
                        <button class="filter_tab">로사</button>
                        <button class="filter_tab">혜현</button>
                        <button class="filter_tab">지수</button>
                    </div>
                    <div class="search_box">
                        <input type="text" id="search_input" class="search_input" placeholder="검색">
                        <button class="search_clear_btn" id="search_clear_btn" title="초기화">&times;</button>
                    </div>
                </div>

                <div class="table_container">
                    <table class="review_table">
                        <thead>
                            <tr>
                                <th class="col_num">No.</th>
                                <th class="col_date">모임 날짜</th>
                                <th class="col_title">책 제목</th>
                                <th class="col_author">작가명</th>
                                <th class="col_reviewer">작성자</th>
                                <th class="col_rating">평균 별점</th>
                            </tr>
                        </thead>
                        <tbody id="review_tbody"></tbody>
                    </table>
                </div>
                <div class="load_more_wrap" id="load_more_wrap" style="display:none;">
                    <button class="load_more_btn" id="load_more_btn">더보기</button>
                </div>
            </main>
            <aside class="areabox"></aside>
        </div>

        <footer class="footer">
            &copy; 2026 도란도란독서. All rights reserved.
        </footer>
    </div>

    <!-- 등록/수정 모달 -->
    <dialog class="review_modal" id="review_modal">
        <div class="modal_content">
            <h2 class="modal_title" id="form_modal_title">리뷰 등록</h2>
            <form class="review_form" id="review_form">
                <label for="reviewer_select">작성자</label>
                <select id="reviewer_select" class="form_input">
                    <option value="">선택</option>
                    <option value="로사">로사</option>
                    <option value="혜현">혜현</option>
                    <option value="지수">지수</option>
                </select>

                <label for="meeting_date_input">모임 날짜</label>
                <input type="date" id="meeting_date_input" class="form_input">

                <label for="book_title_input">도서명</label>
                <input type="text" id="book_title_input" class="form_input" placeholder="도서명 입력">

                <label for="author_input">저자</label>
                <input type="text" id="author_input" class="form_input" placeholder="저자 입력">

                <label for="thoughts_input">읽은 소감</label>
                <textarea id="thoughts_input" class="form_input textarea_large" placeholder="소감을 자유롭게 남겨주세요"></textarea>

                <label for="other_input">기타</label>
                <textarea id="other_input" class="form_input textarea_small" placeholder="기타 메모"></textarea>

                <label for="one_line_input">한줄평</label>
                <input type="text" id="one_line_input" class="form_input" placeholder="한줄평을 남겨주세요">

                <label for="rating_input">별점</label>
                <input type="text" id="rating_input" class="form_input" placeholder="예: 4.5">

                <div class="form_actions full_width">
                    <button type="button" class="cancel_btn" id="modal_cancel_btn">취소</button>
                    <button type="submit" class="submit_btn" id="form_submit_btn">등록</button>
                </div>
            </form>
        </div>
    </dialog>

    <!-- 상세 뷰 모달 -->
    <dialog class="detail_modal" id="detail_modal">
        <div class="detail_header">
            <div class="detail_title" id="detail_book_title">제목</div>
            <div class="detail_actions">
                <button class="submit_btn" id="detail_edit_btn">수정</button>
                <button class="cancel_btn" id="detail_close_btn">닫기</button>
            </div>
        </div>
        <div class="detail_info_grid">
            <div class="info_item">
                <span class="info_label">작성자</span>
                <span class="info_value" id="detail_reviewer">-</span>
            </div>
            <div class="info_item">
                <span class="info_label">저자</span>
                <span class="info_value" id="detail_author">-</span>
            </div>
            <div class="info_item">
                <span class="info_label">모임 날짜</span>
                <span class="info_value" id="detail_date">-</span>
            </div>
            <div class="info_item">
                <span class="info_label">별점</span>
                <span class="info_value rating" id="detail_rating">-</span>
            </div>
        </div>
        <div class="detail_content_area">
            <div class="detail_section" id="detail_oneline_section">
                <div class="detail_section_title">한줄평</div>
                <div class="detail_text oneline" id="detail_oneline">-</div>
            </div>
            <div class="detail_section">
                <div class="detail_section_title">읽은 소감</div>
                <div class="detail_text" id="detail_thoughts">-</div>
            </div>
            <div class="detail_section" id="detail_other_section">
                <div class="detail_section_title">기타</div>
                <div class="detail_text" id="detail_other">-</div>
            </div>
        </div>
    </dialog>

    <script type="module">
        import {
            db,
            collection, collectionGroup, addDoc, getDocs, getDoc,
            updateDoc, doc, query, orderBy, limit, serverTimestamp
        } from './firebase-config.js';

        // ── 전역 상태
        let currentEditId       = null;
        let currentEditReviewer = null;
        let allReviews          = [];
        const PAGE_SIZE         = 20;
        let visibleCount        = PAGE_SIZE;

        // ── Firestore 경로
        // 구조: reviews/{reviewer}/posts/{docId}
        const postsCol = (reviewer) => collection(db, 'reviews', reviewer, 'posts');
        const postDoc  = (reviewer, id) => doc(db, 'reviews', reviewer, 'posts', id);

        // ── Mock Data (최초 1회 삽입용)
        const defaultMockData = [
            {
                date: "2026.05.18", title: "궤도", author: "사만다 하비",
                reviewer: "로사", rating: "★ 4.1",
                thoughts: "위대한 주제를 다루는 소설. \n보편적이면서도 개별적인 인간들. 위대하면서 동시에 무가치한 삶. 진보하면서 동시에 반복되는 역사. 이루고 나면 보잘것없지만 아름다운 꿈과 계속 꿈꾸는 사람들. 죽을 걸 알고도 살아가는 운명.\n궤도를 맴도는(달이든 화성이든 가지 않고) 우주선의 선원들이라는 설정이 이 모든 이야기를 잘 드러내고 있다. 좋은 은유.\nSF이면서 서정적이어서 놀랐고. \n좀더 잘 읽었어야 했는데.",
                oneLine: "위대하고 아름다운 명상", other: ""
            },
            {
                date: "2026.05.18", title: "궤도", author: "사만다 하비",
                reviewer: "혜현", rating: "★ 4",
                thoughts: "1. [책에 대한 인상]\n책이 예뻐서 좋았음. 원래 우주 영상 보는 것을 좋아하기도 하고, 마침 마지막 부분을 일본 여행 때문에 비행기 안에서 읽었는데 하늘과 바다의 경계가 모호한 공간에서 읽어서 그런지 시기도 느낌도 원래 본연의 취향과도 잘 맞았던 책임.\n\n2. [자연에 대한 경외, 인간에 대한 혐오]\n거대한 자연 앞에서의 인간의 연약함, 지구를 파괴한 것으로도 모자라 우주마저 정복하려는 인간의 탐욕과 이기심에 대한 저자의 비판점이 잘 담겨 있다고 생각함\n\n3. [서사보다는 묘사가 중심이 되는 소설에 대한 호불호]\n그림책을 읽는 것 같은 느낌도 많이 들었는데, 개인적으로는 호감 요소였음\n\n4. [오리엔탈리즘의 향기]\n일본에 대한 묘사에서 느껴지는 묘한 거부감",
                oneLine: "탄생과 죽음의 순환, 그 자체의 거대함이 주는 평온함", other: ""
            },
            {
                date: "2026.05.18", title: "궤도", author: "사만다 하비",
                reviewer: "지수", rating: "★ 4.1",
                thoughts: "우주 영화로 보던 우주가 아니라 내가 우주비행사고 우주에 나가면 이런 느낌이겠구나 싶은 잔잔함을 느꼈음.\n인간은 언제나 우주로 나아가고 싶어 하는데, 막상 우주로 가는 길은 죽음으로 가는 길과 같다고 생각했음.\n하고 싶은 이야기가 뭔지는 알겠는데, 이야기가 너무 많아서 집중이 좀 안됨.\n개인적으로는 문장스타일이 좋아서 그냥 에세이 읽는다는 느낌으로 읽으니까 괜찮았던것 같음",
                oneLine: "우주를 떠도는 우주 비행사를 꿈꾸게 만드는", other: ""
            }
        ];

        // ── Firestore CRUD
        async function fetchReviews() {
            // collectionGroup('posts') → 모든 작성자의 posts 한 번에 조회
            // Firestore 색인(Index) 오류를 피하기 위해 가져온 후 자바스크립트에서 정렬합니다.
            const q    = query(collectionGroup(db, 'posts'));
            const snap = await getDocs(q);
            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // 날짜 내림차순 정렬 (최신이 위로 오도록)
            return data.sort((a, b) => new Date(b.createdAt?.toDate?.() || 0) - new Date(a.createdAt?.toDate?.() || 0));
        }

        async function fetchReviewById(reviewer, id) {
            const snap = await getDoc(postDoc(reviewer, id));
            return snap.exists() ? { id: snap.id, ...snap.data() } : null;
        }

        async function addReview(data) {
            // reviews/{reviewer}/posts/{auto-id}
            await addDoc(postsCol(data.reviewer), { ...data, createdAt: serverTimestamp() });
        }

        async function editReview(reviewer, id, data) {
            // reviews/{reviewer}/posts/{id}
            await updateDoc(postDoc(reviewer, id), { ...data, updatedAt: serverTimestamp() });
        }

        async function seedIfEmpty() {
            const snap = await getDocs(query(collectionGroup(db, 'posts'), limit(1)));
            if (snap.empty) {
                for (const item of defaultMockData) {
                    await addDoc(postsCol(item.reviewer), { ...item, createdAt: serverTimestamp() });
                }
            }
        }

        // ── 필터 / 검색
        function getFiltered(reviews) {
            const activeTab = document.querySelector('.filter_tab.active').innerText.trim();
            const keyword   = document.getElementById('search_input').value.trim().toLowerCase();
            return reviews.filter(r => {
                const matchTab    = activeTab === '전체' || r.reviewer === activeTab;
                const matchSearch = !keyword ||
                    (r.title  || '').toLowerCase().includes(keyword) ||
                    (r.author || '').toLowerCase().includes(keyword);
                return matchTab && matchSearch;
            });
        }

        // ── 테이블 렌더링
        const tbody = document.getElementById('review_tbody');

        function renderTable(reviews) {
            const filtered = getFiltered(reviews);
            const toShow   = filtered.slice(0, visibleCount);
            tbody.innerHTML = '';
            toShow.forEach(r => {
                const tr = document.createElement('tr');
                tr.classList.add('review_row');
                tr.innerHTML = `
                    <td class="col_num auto_num"></td>
                    <td class="col_date">${r.date}</td>
                    <td class="col_title clickable_item" data-id="${r.id}" data-reviewer="${r.reviewer}">
                        <a>${r.title}</a>
                    </td>
                    <td class="col_author">${r.author}</td>
                    <td class="col_reviewer">${r.reviewer}</td>
                    <td class="col_rating">${r.rating}</td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('load_more_wrap').style.display =
                filtered.length > visibleCount ? '' : 'none';
        }

        // ── 하이라이트 카드
        function renderHighlights(reviews) {
            const container = document.getElementById('latest_highlights');
            container.innerHTML = '';
            ['로사', '혜현', '지수'].forEach(member => {
                const latest = reviews.find(r => r.reviewer === member);
                const card   = document.createElement('article');
                card.classList.add('highlight_card', 'clickable_item');
                if (latest) {
                    card.dataset.id       = latest.id;
                    card.dataset.reviewer = latest.reviewer;
                    card.innerHTML = `
                        <div class="hc_header">
                            <span class="hc_reviewer">${latest.reviewer}</span>
                            <span class="hc_rating">${latest.rating}</span>
                        </div>
                        <div class="hc_book">${latest.title}</div>
                        <div class="hc_thoughts">${(latest.thoughts || '').replace(/\n/g, '<br>')}</div>
                        <div class="hc_oneline">"${latest.oneLine || ''}"</div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="hc_header"><span class="hc_reviewer">${member}</span></div>
                        <div class="hc_thoughts" style="color:#999;text-align:center;margin:auto;">아직 작성된 리뷰가 없습니다.</div>
                    `;
                }
                container.appendChild(card);
            });
        }

        // ── 전체 렌더
        async function renderAll() {
            allReviews = await fetchReviews();
            renderTable(allReviews);
            renderHighlights(allReviews);
        }

        function resetAndRender() {
            visibleCount = PAGE_SIZE;
            renderTable(allReviews);
        }

        // ── 상세 뷰 모달
        const detailModal = document.getElementById('detail_modal');

        async function openDetailModal(reviewer, id) {
            const r = await fetchReviewById(reviewer, id);
            if (!r) return;
            document.getElementById('detail_book_title').textContent = r.title;
            document.getElementById('detail_reviewer').textContent   = r.reviewer;
            document.getElementById('detail_author').textContent     = r.author || '-';
            document.getElementById('detail_date').textContent       = r.date;
            document.getElementById('detail_rating').textContent     = r.rating || '-';
            document.getElementById('detail_thoughts').textContent   = r.thoughts || '';
            document.getElementById('detail_oneline').textContent    = r.oneLine ? `"${r.oneLine}"` : '-';
            document.getElementById('detail_other').textContent      = r.other || '';
            document.getElementById('detail_oneline_section').style.display =
                r.oneLine && r.oneLine.trim() ? '' : 'none';
            document.getElementById('detail_other_section').style.display =
                r.other && r.other.trim() ? '' : 'none';
            detailModal.dataset.currentId       = id;
            detailModal.dataset.currentReviewer = reviewer;
            detailModal.showModal();
        }

        tbody.addEventListener('click', e => {
            const cell = e.target.closest('.col_title[data-id]');
            if (cell) openDetailModal(cell.dataset.reviewer, cell.dataset.id);
        });

        document.getElementById('latest_highlights').addEventListener('click', e => {
            const card = e.target.closest('.highlight_card[data-id]');
            if (card) openDetailModal(card.dataset.reviewer, card.dataset.id);
        });

        document.getElementById('detail_close_btn').addEventListener('click', () => detailModal.close());

        document.getElementById('detail_edit_btn').addEventListener('click', async () => {
            const id       = detailModal.dataset.currentId;
            const reviewer = detailModal.dataset.currentReviewer;
            const r        = await fetchReviewById(reviewer, id);
            if (!r) return;
            detailModal.close();
            openFormModal(r);
        });

        // ── 등록/수정 폼 모달
        const reviewModal = document.getElementById('review_modal');
        const reviewForm  = document.getElementById('review_form');

        function openFormModal(review = null) {
            reviewForm.reset();
            currentEditId = currentEditReviewer = null;
            if (review) {
                currentEditId       = review.id;
                currentEditReviewer = review.reviewer;
                document.getElementById('form_modal_title').textContent = '리뷰 수정';
                document.getElementById('form_submit_btn').textContent  = '수정 완료';
                document.getElementById('reviewer_select').value        = review.reviewer;
                document.getElementById('meeting_date_input').value     = review.date.replace(/\./g, '-');
                document.getElementById('book_title_input').value       = review.title;
                document.getElementById('author_input').value           = review.author || '';
                document.getElementById('thoughts_input').value         = review.thoughts || '';
                document.getElementById('other_input').value            = review.other || '';
                document.getElementById('one_line_input').value         = review.oneLine || '';
                document.getElementById('rating_input').value           = review.rating
                    ? review.rating.replace('★ ', '').trim() : '';
            } else {
                document.getElementById('form_modal_title').textContent = '리뷰 등록';
                document.getElementById('form_submit_btn').textContent  = '등록';
            }
            reviewModal.scrollTop = 0;
            reviewModal.showModal();
        }

        document.getElementById('open_register_btn').addEventListener('click', () => openFormModal());
        document.getElementById('modal_cancel_btn').addEventListener('click', () => reviewModal.close());

        reviewForm.addEventListener('submit', async e => {
            e.preventDefault();
            const reviewer    = document.getElementById('reviewer_select').value;
            const meetingDate = document.getElementById('meeting_date_input').value;
            const bookTitle   = document.getElementById('book_title_input').value;
            const thoughts    = document.getElementById('thoughts_input').value;
            const author      = document.getElementById('author_input').value || '-';
            const other       = document.getElementById('other_input').value || '';
            const ratingRaw   = document.getElementById('rating_input').value || '-';
            const oneLine     = document.getElementById('one_line_input').value || '';

            if (!reviewer || !meetingDate || !bookTitle.trim() || !thoughts.trim()) {
                alert('데이터를 입력해주세요');
                return;
            }

            const formattedDate = meetingDate.replace(/-/g, '.');
            const displayRating = ratingRaw !== '-' && !ratingRaw.includes('★')
                ? '★ ' + ratingRaw : ratingRaw;

            const payload = { date: formattedDate, title: bookTitle, author, reviewer,
                              rating: displayRating, thoughts, oneLine, other };

            const submitBtn = document.getElementById('form_submit_btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '저장 중...';

            try {
                if (currentEditId && currentEditReviewer) {
                    await editReview(currentEditReviewer, currentEditId, payload);
                } else {
                    await addReview(payload);
                }
                currentEditId = currentEditReviewer = null;
                reviewModal.close();
                await renderAll();
            } catch (err) {
                console.error('저장 실패:', err);
                alert('저장 중 오류가 발생했습니다.');
            } finally {
                submitBtn.disabled    = false;
                submitBtn.textContent = currentEditId ? '수정 완료' : '등록';
            }
        });

        // ── 필터 / 검색 / 더보기
        document.querySelectorAll('.filter_tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter_tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                resetAndRender();
            });
        });

        document.getElementById('search_input').addEventListener('input', resetAndRender);
        document.getElementById('search_clear_btn').addEventListener('click', () => {
            document.getElementById('search_input').value = '';
            resetAndRender();
        });

        document.getElementById('load_more_btn').addEventListener('click', () => {
            visibleCount += PAGE_SIZE;
            renderTable(allReviews);
        });

        // ── 스크롤 헤더
        const wrap = document.querySelector('.wrap');
        window.addEventListener('scroll', () => wrap.classList.toggle('scrolled', window.scrollY > 10));

        // ── 초기 실행
        await seedIfEmpty();  // Firestore 비어있으면 Mock Data 삽입 (reviews/{이름}/posts/)
        await renderAll();
    </script>
</body>

</html>
